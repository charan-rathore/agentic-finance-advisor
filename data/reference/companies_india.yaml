# data/reference/companies_india.yaml
#
# Per-ticker intelligence for Indian NSE-listed companies tracked by
# the India fetcher (settings.INDIA_SYMBOLS). Mirrors the schema of
# data/reference/companies.yaml but uses Indian-specific context.
#
# Fields:
#   key_risks          : 3–6 concrete, company-specific risks (not generic "market risk")
#   cross_references   : [[Wiki Link]] tokens for the Indian wiki knowledge graph
#   sector             : one-line sector label in Indian market context
#   defensive_rating   : same scale as global file
#   nse_symbol         : official NSE ticker (with .NS suffix)
#   market_cap_tier    : 'Large' | 'Mid' | 'Small' (SEBI category)
#   index_membership   : list of major indices the stock belongs to

RELIANCE.NS:
  nse_symbol: "RELIANCE.NS"
  market_cap_tier: "Large"
  index_membership:
    - "Nifty 50"
    - "Sensex"
    - "Nifty 100"
  key_risks:
    - "Oil & gas price volatility impacts refining margins"
    - "Heavy capital expenditure in Jio/Retail creating leverage risk"
    - "Regulatory risk in telecom (TRAI spectrum policy changes)"
    - "Succession and conglomerate holding structure complexity"
    - "Retail/commerce business facing Amazon and Flipkart competition"
  cross_references:
    - "[[Jio Platforms]]"
    - "[[Reliance Retail]]"
    - "[[Indian Petrochemicals]]"
    - "[[5G Rollout India]]"
    - "[[Conglomerate Discount]]"
  sector: "Conglomerate (Energy + Telecom + Retail)"
  defensive_rating: "Moderate Defensive"

