#   sector            : one-line sector label shown in the wiki page
#   defensive_rating  : 'Highly Defensive' | 'Moderate Defensive' | 'Growth/Cyclical'
#                     | 'High Growth/Volatile' | 'Cyclical/Financial' | 'Diversified'
#                     | 'Defensive' | 'Consumer Cyclical'

