# Per-ticker intelligence used by the analysis agent to ground Gemini's wiki
# prompts in material risks and cross-references. All 17 tickers currently
# tracked in YFINANCE_SYMBOLS are covered. Edit freely — the loader
# in core/company_intelligence.py caches this file and falls back to a generic
# profile for anything missing.
#
# Fields:
#   key_risks         : 3-6 concrete, company-specific risks (not generic "market risk")
